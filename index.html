<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="flag">
        <img src="flags.png" class="left_flag">
        <img src="flags.png" class="right_flag">
    </div>

    <div class="container">
        <div class="card">
            <h3>Happy Birthday</h3>
            <h4>To the prettiest girl in humankind.</h4>
            <i class="fa-solid fa-gift" id="gift-icon" title="Open me!"></i>
            
            <img src="siddhi.jpg" id="siddhi-photo" class="siddhi-photo" alt="Siddhi">
            <p id="small-message" class="small-message">There's the BIRTHDAY girl! 💖</p>

            <!-- Hidden initially, shown after gift clicked -->
            <div id="button-group" class="button-group" style="display: none;">
                <button id="btn">Read my letter</button>
                <button id="btn-no">don't want to</button>
            </div>
        </div>
    </div>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
    let giftIcon = document.getElementById("gift-icon");
    let photo = document.getElementById("siddhi-photo");
    let smallMessage = document.getElementById("small-message");
    let button = document.getElementById("btn");
    let buttonGroup = document.getElementById("button-group");
    let btnNo = document.getElementById("btn-no");

    giftIcon.addEventListener("click", function() {
        // Trigger confetti
        confetti({
            particleCount: 200,
            spread: 90,
            origin: { y: 0.5 },
            colors: ['#ffcfd2', '#ffafc5', '#E0479E', '#ffffff']
        });

        // Hide gift
        giftIcon.style.display = "none";

        // Show photo, message, and button group
        photo.style.display = "block";
        smallMessage.style.display = "block";
        buttonGroup.style.display = "flex";
    });

    button.addEventListener("click", function() {
        // Change button text while waiting
        button.innerText = "Opening...";

        // Navigate to message.html after short delay
        setTimeout(() => {
            window.location.href = "message.html";
        }, 800);
    });

    function moveButton() {
        if (btnNo.parentElement !== document.body) {
            document.body.appendChild(btnNo);
        }
        
        const x = Math.max(10, Math.random() * (window.innerWidth - btnNo.offsetWidth - 20));
        const y = Math.max(10, Math.random() * (window.innerHeight - btnNo.offsetHeight - 20));
        
        btnNo.style.position = "fixed";
        btnNo.style.left = `${x}px`;
        btnNo.style.top = `${y}px`;
        btnNo.style.margin = "0";
        btnNo.style.zIndex = "9999";
    }

    btnNo.addEventListener("mouseover", moveButton);
    btnNo.addEventListener("click", function(e) {
        e.preventDefault();
        moveButton();
    });
    </script>

</body>
</html>
